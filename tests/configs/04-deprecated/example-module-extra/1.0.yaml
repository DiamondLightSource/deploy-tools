# yaml-language-server: $schema=/workspaces/deploy-tools/src/deploy_tools/models/schemas/release.json

module:
  name: example-module-extra
  version: "1.0"
  description: Demonstration of adding a module in a later sync

  env_vars:
    - name: EXTRA_VALUE
      value: Updated in a later sync

  applications:
    - app_type: shell

      name: test-extra-echo
      script:
        - echo $EXTRA_VALUE

  allow_updates: true

# Deprecate this release so a later sync can demonstrate restoring it. The module
# config above is otherwise unchanged; only this flag flips, so the sync is treated
# as a deprecation rather than an update.
deprecated: true
