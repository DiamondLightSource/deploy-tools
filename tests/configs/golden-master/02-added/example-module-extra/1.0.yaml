# yaml-language-server: $schema=/workspaces/deploy-tools/src/deploy_tools/models/schemas/release.json

module:
  name: example-module-extra
  version: "1.0"
  description: Demonstration of adding a module in a later sync

  env_vars:
    - name: EXTRA_VALUE
      value: Added after initial deployment

  applications:
    - app_type: shell

      name: test-extra-echo
      script:
        - echo $EXTRA_VALUE

  # Allow in-place updates to this version, so a later sync can change its
  # configuration without bumping the version number.
  allow_updates: true
