# yaml-language-server: $schema=/workspaces/deploy-tools/src/deploy_tools/models/schemas/release.json

module:
  name: example-module-shell
  version: "2.0"
  description: Minimal shell-only module used by the validate tests

  env_vars:
    - name: SHELL_VALUE
      value: hello

  applications:
    - app_type: shell

      name: test-shell-echo
      script:
        - echo $SHELL_VALUE

# A brand-new release introduced directly in a deprecated state. This is only permitted
# with --allow-all (or a from-scratch deploy); a normal deploy must reject it.
deprecated: true
