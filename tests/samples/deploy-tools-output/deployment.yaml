releases:
  example-module-apps:
    '0.1':
      deprecated: false
      module:
        allow_updates: false
        applications:
        - app_type: apptainer
          container:
            path: docker://ghcr.io/apptainer/lolcow
            version: latest
          entrypoints:
          - command: cowsay
            name: cowsay-hello
            options:
              apptainer_args: ''
              command_args: Hello
              host_binaries: []
              mounts: []
          global_options:
            apptainer_args: ''
            command_args: ''
            host_binaries: []
            mounts: []
        - app_type: shell
          name: test-echo-module-var
          script:
          - echo $OTHER_VALUE
        - app_type: shell
          name: test-shell-script
          script:
          - echo This is the first line of a shell script
          - echo and this is the second line.
          - echo Your input is ${1}
        dependencies: []
        description: Demonstration of a module configuration folder
        env_vars:
        - name: OTHER_VALUE
          value: Version 0.1
        exclude_from_defaults: false
        load_script: []
        name: example-module-apps
        unload_script: []
        version: '0.1'
  example-module-deps:
    '0.2':
      deprecated: false
      module:
        allow_updates: false
        applications: []
        dependencies:
        - name: example-module-apps
          version: '0.1'
        description: Demonstration of deploy-tools dependencies
        env_vars: []
        exclude_from_defaults: false
        load_script: []
        name: example-module-deps
        unload_script: []
        version: '0.2'
settings:
  default_versions: {}
